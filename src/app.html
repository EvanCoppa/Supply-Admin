<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="application-name" content="Supply Admin" />

    <!-- iOS / Safari standalone (Add to Home Screen) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Supply" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="min-h-screen bg-slate-50 text-slate-900 antialiased"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
