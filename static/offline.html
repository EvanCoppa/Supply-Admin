<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Supply Admin</title>
    <link rel="icon" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
        font-family:
          'Inter Variable', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
      }
      h1 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
      }
      p {
        margin: 0;
        max-width: 28rem;
        color: #475569;
        line-height: 1.5;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.625rem 1.25rem;
        font: inherit;
        font-weight: 600;
        color: #f8fafc;
        background: #0f172a;
        border: none;
        border-radius: 0.625rem;
        cursor: pointer;
      }
      button:active {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/icons/icon-192.png" alt="Supply Admin" />
    <h1>You're offline</h1>
    <p>
      Supply Admin needs a network connection to load this page. Check your connection and try
      again.
    </p>
    <button type="button" onclick="location.reload()">Retry</button>
  </body>
</html>
